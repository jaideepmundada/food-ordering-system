<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Food Ordering System</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">Foodie</h1>
            <ul class="nav-links">
                <li><a href="index.html">Menu</a></li>
                <li><a href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h2 class="section-title">Checkout Details</h2>
        
        <div class="checkout-container">
            <div class="form-container">
                <h3>Delivery Information</h3>
                <form id="order-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required placeholder="123-456-7890">
                    </div>
                    <div class="form-group">
                        <label for="address">Delivery Address</label>
                        <textarea id="address" name="address" required placeholder="123 Main St, City..." rows="3"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block">Place Order</button>
                </form>
                <div id="order-message" class="message"></div>
            </div>
            
            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-row total-row">
                    <span>Amount to Pay:</span>
                    <span>$<span id="checkout-total">0.00</span></span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Foodie Ordering System. All rights reserved.</p>
    </footer>

    <script src="js/order.js"></script>
</body>
</html>
